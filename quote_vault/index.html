<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteVault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>QuoteVault</h1>
    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="favorites.html">Favorites</a>
    </nav>
  </header>

  <main>
    <div class="quote-card">
      <p id="quote">Loading quote...</p>
      <h3 id="author"></h3>
      <button id="new-quote-btn">New Quote</button>
      <button id="save-btn">Save to Favorites</button>
      <button id="copy-btn">Copy Quote</button>

      <p id="copy-message"></p>
    </div>

    <input type="text" id="search-input" placeholder="Search quotes...(e.g., 'life', 'love', etc.)"/>
    <button id="search-btn">Search</button>
  </main>

  <script src="index.js" defer></script>
    
  <footer>
    <p>&copy; 2026 QuoteVault. All rights reserved.</p>
  </footer>
  
</body>
</html>
